<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E0795F">
<meta name="description" content="QG de l'équipe da'wah — tâches, vidéos, argumentaires, récitations et idées, en temps réel.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="L'Appel">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<title>L'Appel — Équipe</title>
<style>
  :root{
    --bg:#FBF7F0; --bg2:#F3EBDF; --card:#FFFFFF; --text:#2B2622; --muted:#8A7F76;
    --accent:#E0795F; --accent-d:#C75F45; --line:#ECE3D8; --good:#4F9D69; --info:#5B8DEF;
    --strip0:#EAE0D2;
    --p1:#FFE8A3; --p2:#FFD3C6; --p3:#CFEAC6; --p4:#C7E0F4; --p5:#E7D4F2; --p6:#FAD9E6;
    --shadow:0 6px 18px rgba(60,40,25,.10); --postext:#3a322c;
  }
  [data-theme="dark"]{
    --bg:#15120E; --bg2:#1d1914; --card:#221E18; --text:#F2EBE2; --muted:#A99E92; --line:#332C24;
    --good:#62B27E; --info:#7BA6F2; --strip0:#322B22;
    --p1:#caa94a; --p2:#cf8a76; --p3:#7fb073; --p4:#6f9cc0; --p5:#9d7fb8; --p6:#bd7e98;
    --shadow:0 6px 18px rgba(0,0,0,.35); --postext:#1c1813;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding-bottom:env(safe-area-inset-bottom);overscroll-behavior-y:none}
  #app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font:inherit;color:inherit}
  a{color:var(--accent)}
  .muted{color:var(--muted)} .accent{color:var(--accent)}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg),var(--bg) 72%,rgba(251,247,240,0));padding:14px 16px 8px;display:flex;align-items:center;gap:8px}
  [data-theme="dark"] header{background:linear-gradient(var(--bg),var(--bg) 72%,rgba(21,18,14,0))}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px}
  .logo{width:30px;height:30px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;flex:0 0 auto;box-shadow:var(--shadow)}
  .spacer{flex:1}
  .iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--card);box-shadow:var(--shadow);position:relative}
  .iconbtn svg{width:20px;height:20px}
  .badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 3px}
  .chip{font-size:12px;font-weight:700;padding:5px 9px;border-radius:999px;background:var(--card);box-shadow:var(--shadow);white-space:nowrap}

  main{flex:1;padding:6px 16px 100px}
  h2.sec{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:20px 4px 10px}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:10px}
  .grow{flex:1;min-width:0}
  .ttl{font-weight:700} .small{font-size:13px} .tiny{font-size:11.5px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--bg2)}
  .pill.on{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}
  .pill.info{background:color-mix(in srgb,var(--info) 16%,transparent);color:var(--info)}
  .pill.warn{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent-d)}
  .btn{background:var(--accent);color:#fff;font-weight:700;padding:11px 16px;border-radius:13px;box-shadow:var(--shadow)}
  .btn:active{transform:translateY(1px)}
  .btn.sm{padding:8px 12px;border-radius:11px;font-size:14px}
  .btn.ghost{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
  .btn.line{background:transparent;color:var(--accent);box-shadow:none;border:1.5px solid var(--accent)}
  .btn.block{width:100%}
  .avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;flex:0 0 auto}

  .momento{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:8px 0 4px}
  .momento .card{padding:12px;text-align:center;margin:0}
  .momento .big{font-size:24px;font-weight:800;line-height:1.1}
  .momento .lbl{font-size:11px;color:var(--muted);margin-top:3px}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .linkcard{display:flex;align-items:center;gap:10px;background:var(--card);box-shadow:var(--shadow);border-radius:14px;padding:12px;font-weight:700}
  .linkcard svg{width:22px;height:22px;color:var(--accent)}

  .strip{display:flex;gap:4px;margin-top:8px}
  .sq{width:100%;height:15px;border-radius:5px;background:var(--strip0)}
  .dlist{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .dpill{font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--bg2);color:var(--muted);display:inline-flex;gap:5px;align-items:center}
  .dpill.on{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}

  .counter{display:flex;align-items:center;gap:6px}
  .cbtn{width:40px;height:40px;border-radius:12px;background:var(--bg2);display:grid;place-items:center;font-size:22px;font-weight:700}
  .cval{min-width:40px;text-align:center;font-size:22px;font-weight:800}
  .pbar{height:8px;border-radius:999px;background:var(--bg2);overflow:hidden;margin-top:10px}
  .pbar>i{display:block;height:100%;background:var(--good);border-radius:999px;transition:width .25s}
  .done-badge{color:var(--good);font-weight:800;font-size:13px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .postit{border-radius:14px;padding:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;min-height:92px;color:var(--postext)}
  .postit .pt{font-weight:800;font-size:15px;word-break:break-word}
  .postit .pn{font-size:13px;opacity:.85;word-break:break-word}
  .postit.done{opacity:.62} .postit.done .pt{text-decoration:line-through}
  .who{font-size:11.5px;font-weight:800;background:rgba(0,0,0,.10);padding:3px 8px;border-radius:999px;align-self:flex-start}
  .pacts{display:flex;gap:7px;margin-top:auto;flex-wrap:wrap}
  .pact{font-size:12.5px;font-weight:800;padding:6px 10px;border-radius:9px;background:rgba(0,0,0,.12);color:var(--postext)}
  .pact.pri{background:rgba(0,0,0,.78);color:#fff}

  .field{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:11px 13px;margin:7px 0}
  .field:focus{outline:none;border-color:var(--accent)}
  textarea.field{resize:vertical;min-height:60px}
  label.lab{font-size:12.5px;font-weight:700;color:var(--muted);margin:6px 2px 0;display:block}
  .seg{display:flex;gap:6px;margin:7px 0}
  .seg button{flex:1;padding:9px;border-radius:11px;background:var(--bg2);font-weight:700;font-size:13px}
  .seg button.on{background:var(--accent);color:#fff}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .tab2{font-size:13px;font-weight:700;padding:7px 12px;border-radius:999px;background:var(--card);box-shadow:var(--shadow);color:var(--muted)}
  .tab2.on{background:var(--accent);color:#fff}
  .weekstrip{display:flex;gap:5px;margin:6px 0 2px}
  .wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 2px;border-radius:11px;background:var(--card);box-shadow:var(--shadow);color:var(--muted)}
  .wday.sel{background:var(--accent);color:#fff}
  .wday.today:not(.sel){color:var(--accent)}
  .wday .wd{font-size:10px;font-weight:800;text-transform:uppercase}
  .wday .wn{font-size:16px;font-weight:800}
  .wday .wdot{font-size:9px;font-weight:800;min-width:14px;height:14px;border-radius:7px;background:var(--accent);color:#fff;display:grid;place-items:center;margin-top:2px}
  .wday.sel .wdot{background:#fff;color:var(--accent)}
  .wday .wdot.empty{background:transparent;min-width:14px}
  .arow{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid var(--line)}
  .atime{font-size:12.5px;font-weight:800;color:var(--muted);min-width:38px}
  .adot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 8px}
  .chip2{font-size:13px;font-weight:700;padding:7px 11px;border-radius:999px;background:var(--bg2);color:var(--muted)}
  .chip2.on{background:var(--accent);color:#fff}
  .srow{display:flex;align-items:center;gap:10px;padding:9px 6px;border-bottom:1px solid var(--line);cursor:pointer}
  .srow:last-child{border-bottom:none}
  .snum{width:30px;height:30px;border-radius:8px;background:var(--bg2);display:grid;place-items:center;font-weight:800;font-size:13px;flex:0 0 auto}

  .vid{display:flex;flex-direction:column;gap:8px}
  .tagrow{display:flex;gap:6px;flex-wrap:wrap}
  .platrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .plat{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;background:var(--bg2);color:var(--muted)}
  .plat.on{background:color-mix(in srgb,var(--good) 20%,transparent);color:var(--good)}
  .argbox{background:var(--bg2);border-radius:12px;padding:10px;margin-top:8px}
  .vidargs{margin-top:9px;border-top:1px dashed var(--line);padding-top:9px;display:flex;flex-direction:column;gap:7px}
  .amini{background:var(--bg2);border-radius:11px;padding:9px 11px}
  .amini .amini-t{font-weight:800;font-size:14px;line-height:1.25}
  .amini .argbox{margin-top:6px;background:var(--card)}
  .pill.bann-badge{background:var(--accent);color:#fff}
  .copybtn{font-size:12px;font-weight:800;padding:5px 10px;border-radius:9px;background:var(--card);box-shadow:var(--shadow)}
  .recit{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .check{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);display:grid;place-items:center;flex:0 0 auto;font-weight:900}
  .check.on{background:var(--good);border-color:var(--good);color:#fff}
  .idea{border-left:4px solid var(--accent);padding:10px 12px;background:var(--card);box-shadow:var(--shadow);border-radius:12px;margin-bottom:10px}
  .idea.amel{border-left-color:var(--info)}
  .back{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--accent);margin-bottom:6px}
  .empty{text-align:center;color:var(--muted);padding:26px 10px}

  nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--card);border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto;padding:8px 6px calc(8px + env(safe-area-inset-bottom));transition:transform .2s ease}
  body.kb-open nav{display:none}
  .nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;font-weight:700;padding:4px 2px;border-radius:12px}
  .nav-i.on{color:var(--accent)}
  .nav-i svg{width:23px;height:23px}

  .onb{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;gap:6px;max-width:440px;margin:0 auto;width:100%}
  .onb .big{font-size:27px;font-weight:800;line-height:1.15}
  .names{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .namebtn{background:var(--card);box-shadow:var(--shadow);border-radius:14px;padding:14px;font-weight:800;display:flex;align-items:center;gap:10px}
  .namebtn .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:14px;flex:0 0 auto}
  .fade{animation:f .22s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .center{text-align:center}
  .sheet{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center}
  .sheet .inner{background:var(--card);width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom))}
  .sheet .opt{display:flex;align-items:center;gap:12px;padding:14px 6px;font-weight:700;border-bottom:1px solid var(--line)}
  .sheet .opt svg{width:22px;height:22px;color:var(--accent)}

  /* v3 — votes, commentaires, notifications */
  .vrow{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
  .vbtn{font-size:14px;font-weight:800;padding:7px 11px;border-radius:11px;background:rgba(0,0,0,.08);color:var(--postext);display:inline-flex;align-items:center;gap:5px;border:1.5px solid transparent}
  .vbtn.on.up{background:color-mix(in srgb,var(--good) 22%,transparent);color:var(--good);border-color:var(--good)}
  .vbtn.on.dn{background:color-mix(in srgb,var(--accent) 22%,transparent);color:var(--accent-d);border-color:var(--accent-d)}
  .vcount{font-size:13px;font-weight:800;min-width:18px;text-align:center}
  .voters{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  .voter{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;background:var(--bg2);color:var(--muted)}
  .voter.up{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}
  .voter.dn{background:color-mix(in srgb,var(--accent) 18%,transparent);color:var(--accent-d)}
  .cwrap{margin-top:10px;border-top:1px solid var(--line);padding-top:8px}
  .cmsg{display:flex;flex-direction:column;gap:2px;padding:7px 0;border-bottom:1px dashed var(--line)}
  .cmsg:last-child{border-bottom:none}
  .cmeta{font-size:11.5px;color:var(--muted);font-weight:700}
  .ctxt{font-size:13.5px;word-break:break-word;line-height:1.4}
  .cadd{display:flex;gap:6px;margin-top:8px}
  .cadd input{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:11px;padding:9px 12px;font-size:14px}
  .cadd input:focus{outline:none;border-color:var(--accent)}
  .cadd button{background:var(--accent);color:#fff;font-weight:800;padding:9px 14px;border-radius:11px;font-size:14px;flex:0 0 auto}
  .ctoggle{font-size:12.5px;font-weight:800;color:var(--accent);background:transparent;padding:6px 0;display:inline-flex;align-items:center;gap:4px}
  .toast{position:fixed;top:64px;left:50%;transform:translateX(-50%);background:var(--card);color:var(--text);padding:11px 16px;border-radius:13px;box-shadow:0 10px 28px rgba(60,40,25,.25);z-index:60;max-width:92%;font-weight:700;font-size:14px;border-left:4px solid var(--accent);animation:tin .25s ease;cursor:pointer}
  [data-theme="dark"] .toast{box-shadow:0 10px 28px rgba(0,0,0,.55)}
  @keyframes tin{from{opacity:0;transform:translate(-50%,-12px)}to{opacity:1;transform:translate(-50%,0)}}
  .notif{display:flex;gap:10px;padding:11px 10px;border-bottom:1px solid var(--line);align-items:flex-start;cursor:pointer}
  .notif:last-child{border-bottom:none}
  .notif.unread{background:color-mix(in srgb,var(--accent) 7%,transparent)}
  .nicon{width:32px;height:32px;border-radius:9px;background:var(--bg2);display:grid;place-items:center;font-size:16px;flex:0 0 auto}
  .nicon.unread{background:color-mix(in srgb,var(--accent) 22%,transparent)}
  .ntitle{font-weight:800;font-size:14px}
  .nbody{font-size:13px;color:var(--muted);margin-top:2px;word-break:break-word}
  .ntime{font-size:11px;color:var(--muted);margin-top:3px}
  /* v6 — releases (Quoi de neuf) */
  .relcard{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px;border-left:4px solid #C97AB5}
  .relcard.draft{border-left-color:#E0A23C;background:linear-gradient(180deg,color-mix(in srgb,#E0A23C 7%,var(--card)),var(--card))}
  .relcard .rtitle{font-weight:800;font-size:16px}
  .relcard .rmeta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .relcard .rbody{font-size:14px;margin-top:9px;white-space:pre-wrap;word-break:break-word}
  .relcard .rideas{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .relcard .ridea{font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--bg2);color:var(--muted);cursor:pointer}
  .relcard .ridea:hover{background:color-mix(in srgb,var(--accent) 12%,var(--bg2))}
  .relbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 8px;border-radius:999px;background:color-mix(in srgb,#C97AB5 22%,transparent);color:#A04B8C;margin-top:6px;cursor:pointer}
  [data-theme="dark"] .relbadge{color:#D9A2C9}
  .draftprompt{background:linear-gradient(180deg,color-mix(in srgb,#E0A23C 10%,var(--card)),var(--card));border:1.5px solid color-mix(in srgb,#E0A23C 35%,transparent);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  /* v4 — taille du SVG dans la carte de prompt push */
  .ttl svg{width:18px;height:18px;vertical-align:middle}
</style>
</head>

function subscribe(){
  var c=client();
  if(channel){ try{c.removeChannel(channel);}catch(e){} }
  var f="code=eq."+state.code;
  var tables=["team_members","team_duties","team_duty_log","team_tasks","team_videos","team_video_reposts","team_arguments","team_recitations","team_ideas","team_idea_votes","team_idea_comments","team_releases","team_release_ideas","team_dl_services","team_argument_videos","team_channels"];
  channel=c.channel("team-"+state.code);
  tables.forEach(function(t){ channel.on("postgres_changes",{event:"*",schema:"public",table:t,filter:f},debRefresh); });
  // Toasts en direct sur nouvelles idées et nouveaux commentaires (pas par soi-même)
  channel.on("postgres_changes",{event:"INSERT",schema:"public",table:"team_ideas",filter:f},function(p){ onLiveIdea(p&&p.new); });
  channel.on("postgres_changes",{event:"INSERT",schema:"public",table:"team_idea_comments",filter:f},function(p){ onLiveComment(p&&p.new); });
  channel.on("postgres_changes",{event:"UPDATE",schema:"public",table:"team_releases",filter:f},function(p){ onLiveReleasePublished(p&&p.new, p&&p.old); });
  channel.subscribe();
}

/* ---------- Push notifications (v4 — app fermée) ---------- */
function pushSupported(){ return ("serviceWorker" in navigator) && ("PushManager" in window) && ("Notification" in window); }
function urlBase64ToUint8Array(b64){ var pad="=".repeat((4-b64.length%4)%4); var s=(b64+pad).replace(/-/g,"+").replace(/_/g,"/"); var raw=window.atob(s); var out=new Uint8Array(raw.length); for(var i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i); return out; }
function deviceId(){ var k="team:device_id"; var v=lget(k,""); if(!v){ v="dev_"+Math.random().toString(36).slice(2,10)+Date.now().toString(36); lset(k,v); } return v; }
async function refreshPushState(){
  if(!pushSupported()){ state.pushState="unsupported"; return; }
  var perm=(typeof Notification!=="undefined")?Notification.permission:"default";
  if(perm==="denied"){ state.pushState="denied"; state.pushSub=null; return; }
  try{
    var reg=await navigator.serviceWorker.ready;
    var sub=await reg.pushManager.getSubscription();
    state.pushSub=sub;
    state.pushState=sub?"on":(perm==="granted"?"granted-not-subscribed":"default");
  }catch(e){ state.pushState="error"; }
}
async function enablePush(){
  if(!pushSupported()){ alert("Ce navigateur ne supporte pas les notifications push."); return false; }
  try{
    var perm=await Notification.requestPermission();
    if(perm!=="granted"){ state.pushState=(perm==="denied"?"denied":"default"); render(); return false; }
    var reg=await navigator.serviceWorker.ready;
    var sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC) });
    var keys=sub.toJSON().keys||{};
    var row={code:state.code,member:state.me,endpoint:sub.endpoint,p256dh:keys.p256dh,auth:keys.auth,device_id:deviceId(),user_agent:(navigator.userAgent||"").slice(0,250)};
    await client().from("team_push_subs").upsert(row,{onConflict:"endpoint"});
    state.pushSub=sub; state.pushState="on";
    lset("team:push_prompt_dismissed_v4","1"); state.pushPromptDismissed=true;
    render();
    return true;
  }catch(e){ console.error("enablePush",e); alert("Impossible d'activer les notifications : "+(e&&e.message||e)); return false; }
}
async function disablePush(){
  try{
    var reg=await navigator.serviceWorker.ready;
    var sub=await reg.pushManager.getSubscription();
    if(sub){
      try{ await client().from("team_push_subs").delete().eq("endpoint",sub.endpoint); }catch(_){}
      try{ await sub.unsubscribe(); }catch(_){}
    }
    state.pushSub=null; state.pushState="default";
    render();
  }catch(e){ console.error("disablePush",e); }
}
function dismissPushPrompt(){ lset("team:push_prompt_dismissed_v4","1"); state.pushPromptDismissed=true; render(); }
function pushPromptCard(){
  if(state.pushState!=="default"&&state.pushState!=="granted-not-subscribed") return "";
  if(state.pushPromptDismissed&&state.pushState!=="granted-not-subscribed") return "";
  if(!pushSupported()) return "";
  return '<div class="card" style="border-left:4px solid var(--accent);background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 8%,var(--card)),var(--card))">'+
    '<div class="ttl" style="display:flex;align-items:center;gap:6px"><span style="width:18px;height:18px;display:inline-grid;place-items:center;color:var(--accent)">'+IC.bell+'</span> Active les notifications</div>'+
    '<p class="small muted" style="margin:6px 0 10px">Reçois une notification quand un frère ajoute une idée ou un commentaire — même app fermée.</p>'+
    '<div class="row" style="gap:8px"><button class="btn sm" data-action="push-enable">Activer</button><button class="btn ghost sm" data-action="push-dismiss">Plus tard</button></div>'+
  '</div>';
}

  if(!isReleaseOwner())return;
  var rel = state.releases.find(function(r){return r.id===id;});
  if(!rel)return;
  if(rel.status==="published"){ alert("Déjà publiée."); return; }
  if(!rel.title || !rel.title.trim()){ alert("Le titre est requis avant publication."); return; }
  if(window.confirm){
    var nSubs = "ce groupe"; // on n'a pas le compte exact, message générique
    if(!window.confirm("Publier maintenant ? Les frères de "+nSubs+" recevront une notif push.")) return;
  }
  var c=client();

  if(linkedIds.length){

function onLiveReleasePublished(row, old){
  if(!row)return;
  if(old && old.status==="draft" && row.status==="published"){
    if(row.shipped_by===state.me)return;
    showToast("✨ Nouveauté · "+truncate(row.title||"", 48), null);
    state.toast && (state.toast.releaseId = row.id);
  }
}
function ideasNotYetLivrees(){ return state.ideas.filter(function(i){return i.status!=="livree";}); }

/* ---------- Computations ---------- */
function dutiesOf(m){return state.duties.filter(function(d){return d.member===m;});}
function dailyDuties(m){m=m||state.me;return state.duties.filter(function(d){return d.member===m&&d.cadence==="per_day";});}
function weeklyDuties(m){m=m||state.me;return state.duties.filter(function(d){return d.member===m&&d.cadence==="per_week";});}
function monthlyDuties(m){m=m||state.me;return state.duties.filter(function(d){return d.member===m&&d.cadence==="per_month";});}
function countOn(member,dutyId,day){var l=logFor(member,dutyId,day);return l?l.count:0;}
function weekSum(member,dutyId){var ws=weekStart(),s=0;for(var i=0;i<state.logs.length;i++){var l=state.logs[i];if(l.member===member&&l.duty_id===dutyId&&l.day>=ws)s+=l.count;}return s;}
function monthStart(){var d=new Date();d.setDate(1);d.setHours(0,0,0,0);return ymd(d);}
function monthSum(member,dutyId){var ms=monthStart(),s=0;for(var i=0;i<state.logs.length;i++){var l=state.logs[i];if(l.member===member&&l.duty_id===dutyId&&l.day>=ms)s+=l.count;}return s;}
function dutyCount(member,d){ if(d.cadence==="per_month")return monthSum(member,d.id); if(d.cadence==="per_week")return weekSum(member,d.id); return countOn(member,d.id,today()); }
function cadLabel(c){ return c==="per_month"?"Chaque mois":(c==="per_week"?"Chaque semaine":"Chaque jour"); }
function cadPeriodNow(c){ return c==="per_month"?"Ce mois":(c==="per_week"?"Cette semaine":"Aujourd'hui"); }
function dayFrac(member,day){var dd=dailyDuties(member);if(!dd.length)return 0;var n=0;for(var i=0;i<dd.length;i++)if(countOn(member,dd[i].id,day)>=(dd[i].target||1))n++;return n/dd.length;}
function membersSorted(){var a=state.members.slice();a.sort(function(x,y){if(x.name===state.me)return -1;if(y.name===state.me)return 1;return 0;});return a;}
function repostsFor(vid){return state.reposts.filter(function(r){return r.video_id===vid;});}
function argsFor(vid){ var ids={}; (state.argVideos||[]).forEach(function(l){ if(l.video_id===vid) ids[l.argument_id]=1; }); return state.args.filter(function(a){ return ids[a.id]||a.video_id===vid; }); }
function argVideoCount(argId){ var set={}; (state.argVideos||[]).forEach(function(l){ if(l.argument_id===argId) set[l.video_id]=1; }); var a=state.args.find(function(x){return x.id===argId;}); if(a&&a.video_id) set[a.video_id]=1; return Object.keys(set).length; }
function ytId(u){ if(!u)return ""; var m=String(u).match(/(?:v=|youtu\.be\/|\/shorts\/|\/embed\/)([A-Za-z0-9_-]{11})/); return m?m[1]:""; }
function ytThumb(id){ return id?("https://i.ytimg.com/vi/"+id+"/hqdefault.jpg"):""; }
function dlServices(){ return (state.dlServices||[]).filter(function(s){return s.active!==false;}).sort(function(a,b){return (a.sort||0)-(b.sort||0);}); }
function curDlService(){ var ss=dlServices(); return ss.length?ss[0]:null; }
function dlURL(svc,v){ if(!svc)return ""; var id=v.yt_id||ytId(v.url); var yurl=v.url||(id?("https://www.youtube.com/watch?v="+id):""); return String(svc.url_template||"").replace(/\{url\}/g,encodeURIComponent(yurl)).replace(/\{id\}/g,encodeURIComponent(id)); }
function ownerPlats(m){ return OWNER[m||state.me]||[]; }
function groupMessage(v){
  var mine=repostsFor(v.id).filter(function(r){return r.member===state.me;}).map(function(r){return r.platform;});
  var plats=mine.length?mine:ownerPlats(state.me);
  var pstr=plats.length?plats.join(" et "):"ma plateforme";
  var link=v.url||(v.yt_id?("https://www.youtube.com/watch?v="+v.yt_id):"");
  return "J'ai posté sur "+pstr+" celle-ci grâce à Allah 🤲\n\n"+(v.title||"")+(link?("\n"+link):"");
}
function parseDur(iso){ var m=/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/.exec(iso||""); if(!m)return 0; return (parseInt(m[1]||0,10)*3600)+(parseInt(m[2]||0,10)*60)+parseInt(m[3]||0,10); }
async function syncChannel(ch, silent){
  if(!ch){ if(!silent)showToast("Aucune chaîne configurée."); return; }
  var key=lget("team:ytkey",""); if(!key){ if(!silent)showToast("Ajoute d'abord ta clé API YouTube (Réglages)."); return; }
  var pid=ch.uploads_playlist_id; if(!pid){ if(!silent)showToast("Playlist de la chaîne manquante."); return; }
  lset("team:lastsync",String(Date.now()));
  if(!silent)showToast("Synchronisation en cours…");
  var known={}; (state.videos||[]).forEach(function(v){ if(v.yt_id)known[v.yt_id]=v; });
  var token="",pages=0,toAdd=[],byId={},needDur={};
  try{
    do{
      var u="https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId="+encodeURIComponent(pid)+"&key="+encodeURIComponent(key)+(token?("&pageToken="+token):"");
      var r=await fetch(u); var j=await r.json();
      if(j.error){ if(!silent)showToast("Erreur API : "+(j.error.message||"clé invalide ?")); return; }
      (j.items||[]).forEach(function(it){ var sn=it.snippet||{}; var vid=sn.resourceId&&sn.resourceId.videoId; if(!vid)return; var ex=known[vid];
        if(!ex){ var th=sn.thumbnails||{}; var row={code:state.code,title:sn.title||"(sans titre)",url:"https://www.youtube.com/watch?v="+vid,yt_id:vid,thumbnail_url:(th.high||th.medium||th.default||{}).url||null,channel_key:ch.key,kind:"appel",published_at:sn.publishedAt||null,is_short:null,added_by:state.me}; toAdd.push(row); byId[vid]=row; needDur[vid]=1; known[vid]=row; }
        else if(ex.is_short===null||ex.is_short===undefined){ needDur[vid]=1; }
      });
      token=j.nextPageToken||""; pages++;
    } while(token && pages<40);
    var durIds=Object.keys(needDur), shortIds=[], longIds=[];
    for(var b=0;b<durIds.length;b+=50){
      try{ var du="https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id="+durIds.slice(b,b+50).join(",")+"&key="+encodeURIComponent(key); var dr=await fetch(du); var dj=await dr.json(); (dj.items||[]).forEach(function(it){ var sec=parseDur(it.contentDetails&&it.contentDetails.duration); var isS=(sec>0&&sec<=60); if(byId[it.id])byId[it.id].is_short=isS; if(isS)shortIds.push(it.id); else longIds.push(it.id); }); }catch(e2){}
    }
    for(var i=0;i<toAdd.length;i+=100){ await client().from("team_videos").insert(toAdd.slice(i,i+100)); }
    var newIds={}; toAdd.forEach(function(r){newIds[r.yt_id]=1;});
    var updS=shortIds.filter(function(id){return !newIds[id];}), updL=longIds.filter(function(id){return !newIds[id];});
    for(var k=0;k<updS.length;k+=120){ await client().from("team_videos").update({is_short:true}).eq("code",state.code).in("yt_id",updS.slice(k,k+120)); }
    for(var k2=0;k2<updL.length;k2+=120){ await client().from("team_videos").update({is_short:false}).eq("code",state.code).in("yt_id",updL.slice(k2,k2+120)); }
    if(toAdd.length || !silent) showToast("✅ "+toAdd.length+" ajoutée(s), "+(updS.length+updL.length)+" reclassées.");
    await refreshAll();
  }catch(e){ if(!silent)showToast("Erreur de synchro : "+(e&&e.message||e)); }
}
function maybeAutoSync(){ try{ var ch=(state.channels||[])[0]; if(!ch)return; if(!lget("team:ytkey",""))return; var last=parseInt(lget("team:lastsync","0"),10)||0; if(Date.now()-last < 1800000) return; syncChannel(ch, true); }catch(e){} }

/* ---------- Render ---------- */
var app=document.getElementById("app");
function render(){
  if(state.error){ app.innerHTML='<div class="onb"><div class="card center"><b>Souci de connexion</b><p class="muted small">'+esc(state.error)+'</p><button class="btn" data-action="retry">Réessayer</button></div></div>'; return; }
  if(!state.code||!state.me){ renderOnboard(); return; }
  var v=state.view, body="";
  if(v==="point")body=viewPoint();
  else if(v==="videos")body=viewVideos();
  else if(v==="videoDetail")body=viewVideoDetail();
  else if(v==="args")body=viewArguments();
  else if(v==="recits")body=viewRecits();
  else if(v==="tasks")body=viewTasks();
  else if(v==="ideas")body=viewIdeas();
  else if(v==="notifs")body=viewNotifs();
  else if(v==="releases")body=viewReleases();
  else if(v==="releaseReview")body=viewReleaseReview();
  else if(v==="duties")body=viewDuties();
  else if(v==="settings")body=viewSettings();
  app.innerHTML=header()+'<main class="fade">'+body+'</main>'+nav()+(state.sheet?sheet():"");
}

  var dark=document.documentElement.getAttribute("data-theme")==="dark";

  return '<header><div class="logo">'+IC.logo+'</div><div class="brand">L\'Appel</div><div class="spacer"></div>'+
    '<button class="iconbtn" data-action="go" data-view="notifs" aria-label="Notifications">'+IC.bell+(un?'<span class="badge">'+(un>9?"9+":un)+'</span>':'')+'</button>'+

/* ----- Le point (hub) ----- */
function viewPoint(){
  if(!state.ready)return loading();
  var dd=dailyDuties(state.me), tdy=today();
  var vids=state.videos.length, rec=recitsLeft(), ide=ideasNew(), openTasks=state.tasks.filter(function(t){return !t.done;}).length;
  var vTot=quranTotal(), vRest=vTot-versesCovered();
  var h='<div class="momento">'+
    momo(state.videos.filter(function(v){return v.kind==="appel";}).length,"📣 Appels à reposter")+
    momo(fmtN(vRest),"📖 versets /"+fmtN(vTot)+" restants")+
    momo(openTasks,"📌 Tâches ouvertes")+'</div>';
  h+='<div class="links" style="margin-top:6px">'+
    link("videos",IC.videos,"Vidéos ("+vids+")")+
    link("args",IC.args,"Argumentaires ("+state.args.length+")")+
    link("recits",IC.recits,"Récitations")+
    link("ideas",IC.idea,"Idées"+(ide?" ("+ide+")":""))+'</div>';
  h+=pushPromptCard();
  h+=draftPromptCard();

  // à faire aujourd'hui (tâches datées)
  var tdyT=state.tasks.filter(function(t){return t.due_date===tdy&&!t.done;}).sort(function(a,b){var x=a.due_time||"99:99",y=b.due_time||"99:99";return x<y?-1:x>y?1:0;});
  var overN=state.tasks.filter(function(t){return t.due_date&&t.due_date<tdy&&!t.done;}).length;
  h+='<h2 class="sec">À faire aujourd\'hui'+(overN?' · <span style="color:var(--accent-d)">'+overN+' en retard</span>':'')+'</h2><div class="card">';
  if(!tdyT.length&&!overN) h+='<div class="muted small">Rien de daté aujourd\'hui.</div>';
  tdyT.slice(0,5).forEach(function(t){ h+='<div class="row" style="padding:5px 0"><span class="atime" style="min-width:42px">'+(t.due_time||"·")+'</span><div class="grow"><b>'+esc(t.title)+'</b>'+(taskAssignees(t).length?' <span class="tiny muted">'+taskAssignees(t).map(esc).join(", ")+'</span>':'')+'</div><button class="check" data-action="done" data-id="'+t.id+'" style="width:26px;height:26px"></button></div>'; });
  h+='<button class="btn ghost sm block" data-action="open-agenda" style="margin-top:8px">Ouvrir l\'agenda →</button></div>';

  // mes devoirs du jour (rapide)
  h+='<h2 class="sec">Mes devoirs du jour</h2><div class="card">';
  if(!dd.length) h+='<div class="muted small">Aucun devoir quotidien.</div>';
  dd.forEach(function(d){var c=countOn(state.me,d.id,tdy),ok=c>=(d.target||1);
    h+='<div class="row" style="padding:5px 0"><div class="grow"><b>'+esc(d.label)+'</b></div>'+
      '<span class="dpill'+(ok?" on":"")+'">'+(ok?"✓ "+c:"·")+'</span>'+
      '<button class="cbtn" data-action="bump" data-duty="'+d.id+'" data-delta="1" style="width:34px;height:34px;background:var(--accent);color:#fff">+</button></div>';});
  h+='<button class="btn ghost sm block" data-action="go" data-view="duties" style="margin-top:8px">Tous mes devoirs →</button></div>';

  // l'équipe
  h+='<h2 class="sec">L\'équipe</h2>';
  var days=last7();
  membersSorted().forEach(function(m){
    var mdd=dailyDuties(m.name), mwk=weeklyDuties(m.name).concat(monthlyDuties(m.name));
    var pills=mdd.map(function(d){var ok=countOn(m.name,d.id,tdy)>=(d.target||1);return '<span class="dpill'+(ok?" on":"")+'">'+(ok?"✓":"·")+" "+esc(shortLabel(d.label))+'</span>';}).join("");
    var wk=mwk.map(function(d){var s=dutyCount(m.name,d),ok=s>=(d.target||1);return '<span class="dpill'+(ok?" on":"")+'">'+esc(shortLabel(d.label))+" "+s+"/"+(d.target||1)+'</span>';}).join("");
    if(!mdd.length&&!mwk.length){pills='<span class="tiny muted">aucun devoir</span>';}
    var strip=days.map(function(day){return '<div class="sq" title="'+day+'" style="background:'+heat(dayFrac(m.name,day))+'"></div>';}).join("");
    h+='<div class="card"><div class="row"><div class="avatar" style="background:'+avColor(m.name)+'">'+esc(initials(m.name))+'</div><div class="grow"><div class="ttl">'+esc(m.name)+(m.name===state.me?' <span class="tiny accent">(toi)</span>':'')+'</div></div></div><div class="dlist">'+pills+wk+'</div><div class="strip">'+strip+'</div></div>';
  });
  return h;

    }
  }
  var byOpts=state.members.map(function(m){return '<option value="'+esc(m.name)+'"'+(m.name===state.me?" selected":"")+'>'+esc(m.name)+'</option>';}).join("")+'<option value="__autre__">Autre (proche)…</option>';
  h+='<div class="card"><div class="ttl" style="margin-bottom:4px">Marquer un passage récité</div>'+
    '<label class="lab">Sourate</label><select id="r-surah" class="field">'+SURAHS.map(function(nm,i){return '<option value="'+(i+1)+'">'+(i+1)+". "+esc(nm)+'</option>';}).join("")+'</select>'+
    '<div class="row"><input id="r-ayah" class="field" style="margin:0" type="number" min="1" inputmode="numeric" placeholder="Du verset"><input id="r-ayah2" class="field" style="margin:0" type="number" min="1" inputmode="numeric" placeholder="Au verset"></div>'+
    '<label class="lab">Récité par</label><select id="r-by" class="field">'+byOpts+'</select>'+
    '<div class="tiny muted" style="margin:2px 2px 0">Versets vides = sourate entière.</div>'+
    '<button class="btn block" data-action="add-recit" style="margin-top:8px">Marquer récité ✓</button></div>';
  h+='<input id="rec-search" class="field" placeholder="Chercher une sourate (nom ou numéro)" value="'+esc(state.recSearch)+'">';
  var q=state.recSearch.toLowerCase().trim();

  var shown=0;
  for(var sn=1;sn<=114;sn++){

    if(q&&String(sn)!==q&&nm.toLowerCase().indexOf(q)<0) continue;
    shown++; var st=STAT[sn];
    var pill=st.complete?'<span class="pill on">✓ complète</span>':(st.started?('<span class="pill warn">'+Math.round(st.covered/st.total*100)+"% · reste "+(st.total-st.covered)+'</span>'):'<span class="pill">à faire</span>');
    h+='<div class="srow" data-action="surah-toggle" data-s="'+sn+'"><div class="snum">'+sn+'</div><div class="grow"><b>'+esc(nm)+'</b> <span class="tiny muted">'+st.total+' v.</span></div>'+pill+(state.openSurah===sn?' <span class="accent">▾</span>':"")+'</div>';

function releaseCard(r){
  var isDraft = r.status==="draft";

  var meta = '<div class="rmeta">'+(r.version?'<b>'+esc(r.version)+'</b> · ':'')+esc(r.shipped_by||"")+' · '+esc(dateStr)+(r.commit_sha?(' · <code style="font-size:11px;background:var(--bg2);padding:1px 5px;border-radius:4px">'+esc(r.commit_sha.slice(0,7))+'</code>'):'')+'</div>';
  var body = r.body ? '<div class="rbody">'+esc(r.body)+'</div>' : '';
  var ideas = linkedIdeas.length ? '<div class="rideas">'+linkedIdeas.map(function(i){return '<span class="ridea" data-action="goto-idea" data-id="'+i.id+'">'+(i.kind==="amelioration"?"🛠️":"💡")+" "+esc(truncate(i.text,40))+'</span>';}).join("")+'</div>' : '';

    actions = '<div class="row" style="gap:7px;margin-top:10px"><button class="btn sm" data-action="open-review" data-id="'+r.id+'">Réviser et publier</button>'+

  }

    '<div class="rtitle">'+(isDraft?"📝 ":"✨ ")+esc(r.title||"(sans titre)")+'</div>'+
    meta + body + ideas + actions +
  '</div>';
}

document.addEventListener("input",function(ev){ var id=ev.target&&ev.target.id; if(id==="a-search"||id==="rec-search"||id==="v-search"){ if(id==="a-search")state.argQuery=ev.target.value; else if(id==="v-search")state.videoSearch=ev.target.value; else state.recSearch=ev.target.value; var pos=ev.target.selectionStart; render(); var nb=document.getElementById(id); if(nb){nb.focus(); try{nb.setSelectionRange(pos,pos);}catch(e){}} } });

async function start(){ if(!state.code||!state.me)return; try{ client(); loadNotifSeen(); loadReleasesSeen(); await ensureGroup(state.code); await refreshAll(); subscribe(); await refreshPushState(); render(); }catch(e){ console.error(e); state.error=(e&&e.message)||"connexion impossible"; render(); } }

/* iOS PWA : masque la barre du bas quand le clavier virtuel est ouvert (sinon la nav fixed se detache au scroll) */
(function(){
  function isField(t){ return t && (t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable); }
  function kb(on){ var b=document.body; if(b) b.classList.toggle("kb-open", !!on); }
  document.addEventListener("focusin", function(e){ if(isField(e.target)) kb(true); });
  document.addEventListener("focusout", function(){ setTimeout(function(){ if(!isField(document.activeElement)) kb(false); }, 60); });
  if(window.visualViewport){ window.visualViewport.addEventListener("resize", function(){ kb((window.innerHeight - window.visualViewport.height) > 120); }); }
})();
function init(){
  setTheme(lget("team:theme",(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light"));
  if(state.code&&state.me){ state.onbStep="name"; render(); start(); }
  else { state.onbStep="code"; state.onbCode=state.code||""; renderOnboard(); }
  document.addEventListener("visibilitychange",function(){ if(!document.hidden&&state.code&&state.me)debRefresh(); });
  // Deep-link initial via ?idea=ID (clic notif push ou partage de lien)
  try{
    var qs=new URLSearchParams(window.location.search);
    var qi=qs.get("idea"), qr=qs.get("release"), qrr=qs.get("reviewRelease");
    if(qi||qr||qrr){
      var tries=0; var poll=setInterval(function(){ tries++;
        if(state.code&&state.me){ clearInterval(poll);
          if(qi)openIdeaDeepLink(qi);
          if(qr)openReleaseDeepLink(qr);
          if(qrr)openReviewReleaseDeepLink(qrr);
        } else if(tries>40){ clearInterval(poll); }
      },150);
    }
  }catch(_){}
  // Message du Service Worker (clic sur notif push pendant que l\'app est ouverte)
  try{ if("serviceWorker" in navigator){ navigator.serviceWorker.addEventListener("message",function(ev){
    if(!ev||!ev.data)return;
    if(ev.data.type==="open-idea") openIdeaDeepLink(ev.data.ideaId);
    else if(ev.data.type==="open-release") openReleaseDeepLink(ev.data.releaseId);
    else if(ev.data.type==="open-review-release") openReviewReleaseDeepLink(ev.data.releaseId);
  }); } }catch(_){}
}
if(window.supabase||document.readyState!=="loading"){ ready(); } else { window.addEventListener("DOMContentLoaded",ready); }
