<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E0795F">
<meta name="description" content="QG de l'équipe da'wah — tâches, vidéos, argumentaires, récitations et idées, en temps réel.">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>L'Appel — Équipe</title>
<style>
  :root{
    --bg:#FBF7F0; --bg2:#F3EBDF; --card:#FFFFFF; --text:#2B2622; --muted:#8A7F76;
    --accent:#E0795F; --accent-d:#C75F45; --line:#ECE3D8; --good:#4F9D69; --info:#5B8DEF;
    --strip0:#EAE0D2;
    --p1:#FFE8A3; --p2:#FFD3C6; --p3:#CFEAC6; --p4:#C7E0F4; --p5:#E7D4F2; --p6:#FAD9E6;
    --shadow:0 6px 18px rgba(60,40,25,.10); --postext:#3a322c;
  }
  [data-theme="dark"]{
    --bg:#15120E; --bg2:#1d1914; --card:#221E18; --text:#F2EBE2; --muted:#A99E92; --line:#332C24;
    --good:#62B27E; --info:#7BA6F2; --strip0:#322B22;
    --p1:#caa94a; --p2:#cf8a76; --p3:#7fb073; --p4:#6f9cc0; --p5:#9d7fb8; --p6:#bd7e98;
    --shadow:0 6px 18px rgba(0,0,0,.35); --postext:#1c1813;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding-bottom:env(safe-area-inset-bottom)}
  #app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font:inherit;color:inherit}
  a{color:var(--accent)}
  .muted{color:var(--muted)} .accent{color:var(--accent)}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg),var(--bg) 72%,rgba(251,247,240,0));padding:14px 16px 8px;display:flex;align-items:center;gap:8px}
  [data-theme="dark"] header{background:linear-gradient(var(--bg),var(--bg) 72%,rgba(21,18,14,0))}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px}
  .logo{width:30px;height:30px;border-radius:9px;background:var(--accent);display:grid;place-items:center;color:#fff;flex:0 0 auto;box-shadow:var(--shadow)}
  .spacer{flex:1}
  .iconbtn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--card);box-shadow:var(--shadow);position:relative}
  .iconbtn svg{width:20px;height:20px}
  .badge{position:absolute;top:-4px;right:-4px;background:var(--accent);color:#fff;font-size:10px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 3px}
  .chip{font-size:12px;font-weight:700;padding:5px 9px;border-radius:999px;background:var(--card);box-shadow:var(--shadow);white-space:nowrap}

  main{flex:1;padding:6px 16px 100px}
  h2.sec{font-size:13px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:20px 4px 10px}
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:10px}
  .grow{flex:1;min-width:0}
  .ttl{font-weight:700} .small{font-size:13px} .tiny{font-size:11.5px}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--bg2)}
  .pill.on{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}
  .pill.info{background:color-mix(in srgb,var(--info) 16%,transparent);color:var(--info)}
  .pill.warn{background:color-mix(in srgb,var(--accent) 16%,transparent);color:var(--accent-d)}
  .btn{background:var(--accent);color:#fff;font-weight:700;padding:11px 16px;border-radius:13px;box-shadow:var(--shadow)}
  .btn:active{transform:translateY(1px)}
  .btn.sm{padding:8px 12px;border-radius:11px;font-size:14px}
  .btn.ghost{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
  .btn.line{background:transparent;color:var(--accent);box-shadow:none;border:1.5px solid var(--accent)}
  .btn.block{width:100%}
  .avatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#fff;flex:0 0 auto}

  .momento{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:8px 0 4px}
  .momento .card{padding:12px;text-align:center;margin:0}
  .momento .big{font-size:24px;font-weight:800;line-height:1.1}
  .momento .lbl{font-size:11px;color:var(--muted);margin-top:3px}
  .links{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .linkcard{display:flex;align-items:center;gap:10px;background:var(--card);box-shadow:var(--shadow);border-radius:14px;padding:12px;font-weight:700}
  .linkcard svg{width:22px;height:22px;color:var(--accent)}

  .strip{display:flex;gap:4px;margin-top:8px}
  .sq{width:100%;height:15px;border-radius:5px;background:var(--strip0)}
  .dlist{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
  .dpill{font-size:12px;font-weight:700;padding:4px 9px;border-radius:999px;background:var(--bg2);color:var(--muted);display:inline-flex;gap:5px;align-items:center}
  .dpill.on{background:color-mix(in srgb,var(--good) 18%,transparent);color:var(--good)}

  .counter{display:flex;align-items:center;gap:6px}
  .cbtn{width:40px;height:40px;border-radius:12px;background:var(--bg2);display:grid;place-items:center;font-size:22px;font-weight:700}
  .cval{min-width:40px;text-align:center;font-size:22px;font-weight:800}
  .pbar{height:8px;border-radius:999px;background:var(--bg2);overflow:hidden;margin-top:10px}
  .pbar>i{display:block;height:100%;background:var(--good);border-radius:999px;transition:width .25s}
  .done-badge{color:var(--good);font-weight:800;font-size:13px}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .postit{border-radius:14px;padding:12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;min-height:92px;color:var(--postext)}
  .postit .pt{font-weight:800;font-size:15px;word-break:break-word}
  .postit .pn{font-size:13px;opacity:.85;word-break:break-word}
  .postit.done{opacity:.62} .postit.done .pt{text-decoration:line-through}
  .who{font-size:11.5px;font-weight:800;background:rgba(0,0,0,.10);padding:3px 8px;border-radius:999px;align-self:flex-start}
  .pacts{display:flex;gap:7px;margin-top:auto;flex-wrap:wrap}
  .pact{font-size:12.5px;font-weight:800;padding:6px 10px;border-radius:9px;background:rgba(0,0,0,.12);color:var(--postext)}
  .pact.pri{background:rgba(0,0,0,.78);color:#fff}

  .field{width:100%;background:var(--card);border:1.5px solid var(--line);border-radius:13px;padding:11px 13px;margin:7px 0}
  .field:focus{outline:none;border-color:var(--accent)}
  textarea.field{resize:vertical;min-height:60px}
  label.lab{font-size:12.5px;font-weight:700;color:var(--muted);margin:6px 2px 0;display:block}
  .seg{display:flex;gap:6px;margin:7px 0}
  .seg button{flex:1;padding:9px;border-radius:11px;background:var(--bg2);font-weight:700;font-size:13px}
  .seg button.on{background:var(--accent);color:#fff}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
  .tab2{font-size:13px;font-weight:700;padding:7px 12px;border-radius:999px;background:var(--card);box-shadow:var(--shadow);color:var(--muted)}
  .tab2.on{background:var(--accent);color:#fff}
  .weekstrip{display:flex;gap:5px;margin:6px 0 2px}
  .wday{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 2px;border-radius:11px;background:var(--card);box-shadow:var(--shadow);color:var(--muted)}
  .wday.sel{background:var(--accent);color:#fff}
  .wday.today:not(.sel){color:var(--accent)}
  .wday .wd{font-size:10px;font-weight:800;text-transform:uppercase}
  .wday .wn{font-size:16px;font-weight:800}
  .wday .wdot{font-size:9px;font-weight:800;min-width:14px;height:14px;border-radius:7px;background:var(--accent);color:#fff;display:grid;place-items:center;margin-top:2px}
  .wday.sel .wdot{background:#fff;color:var(--accent)}
  .wday .wdot.empty{background:transparent;min-width:14px}
  .arow{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid var(--line)}
  .atime{font-size:12.5px;font-weight:800;color:var(--muted);min-width:38px}
  .adot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}

  .vid{display:flex;flex-direction:column;gap:8px}
  .tagrow{display:flex;gap:6px;flex-wrap:wrap}
  .platrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .plat{font-size:12px;font-weight:700;padding:5px 10px;border-radius:999px;background:var(--bg2);color:var(--muted)}
  .plat.on{background:color-mix(in srgb,var(--good) 20%,transparent);color:var(--good)}
  .argbox{background:var(--bg2);border-radius:12px;padding:10px;margin-top:8px}
  .copybtn{font-size:12px;font-weight:800;padding:5px 10px;border-radius:9px;background:var(--card);box-shadow:var(--shadow)}
  .recit{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .check{width:30px;height:30px;border-radius:9px;border:2px solid var(--line);display:grid;place-items:center;flex:0 0 auto;font-weight:900}
  .check.on{background:var(--good);border-color:var(--good);color:#fff}
  .idea{border-left:4px solid var(--accent);padding:10px 12px;background:var(--card);box-shadow:var(--shadow);border-radius:12px;margin-bottom:10px}
  .idea.amel{border-left-color:var(--info)}
  .back{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--accent);margin-bottom:6px}
  .empty{text-align:center;color:var(--muted);padding:26px 10px}

  nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:color-mix(in srgb,var(--card) 92%,transparent);backdrop-filter:saturate(1.4) blur(10px);border-top:1px solid var(--line);display:flex;max-width:560px;margin:0 auto;padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
  .nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10.5px;font-weight:700;padding:4px 2px;border-radius:12px}
  .nav-i.on{color:var(--accent)}
  .nav-i svg{width:23px;height:23px}

  .onb{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 22px;gap:6px;max-width:440px;margin:0 auto;width:100%}
  .onb .big{font-size:27px;font-weight:800;line-height:1.15}
  .names{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .namebtn{background:var(--card);box-shadow:var(--shadow);border-radius:14px;padding:14px;font-weight:800;display:flex;align-items:center;gap:10px}
  .namebtn .av{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:14px;flex:0 0 auto}
  .fade{animation:f .22s ease}@keyframes f{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .center{text-align:center}
  .sheet{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center}
  .sheet .inner{background:var(--card);width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom))}
  .sheet .opt{display:flex;align-items:center;gap:12px;padding:14px 6px;font-weight:700;border-bottom:1px solid var(--line)}
  .sheet .opt svg{width:22px;height:22px;color:var(--accent)}
</style>
</head>
<body>
<div id="app"><div class="onb"><div class="muted center">Chargement…</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
"use strict";

/* ---------- Config ---------- */
var SB_URL = "https://lpvuklsxnrqliarwvmst.supabase.co";
var SB_KEY = "sb_publishable_OMWOk-Vvkr_2JGle1oz0kg_d1JLntHJ";
var DEFAULT_MEMBERS = ["Bilal","Fahim","Clément","Abdel","Idris","Moussa","Yacoub"];
var DEFAULT_DUTIES = [
  {label:"Poster 1–2 vidéos", cadence:"per_day",  target:1, sort:1},
  {label:"Partager l'appel",  cadence:"per_day",  target:1, sort:2},
  {label:"Réciter (3×/sem)",  cadence:"per_week", target:3, sort:3},
  {label:"Point hebdo équipe", cadence:"per_week", target:1, sort:4}
];
var DEFAULT_RECITS = [
  {label:"Sourate Al-Fâtiha", surah:1, sort:1},
  {label:"Ayat al-Kursî (2:255)", surah:2, ayah:255, sort:2},
  {label:"Fin de Al-Baqara (2:285-286)", surah:2, ayah:285, sort:3},
  {label:"Sourate Al-Kahf", surah:18, sort:4},
  {label:"Sourate Yâ-Sîn", surah:36, sort:5},
  {label:"Sourate Ar-Rahmân", surah:55, sort:6},
  {label:"Sourate Al-Wâqi'a", surah:56, sort:7},
  {label:"Sourate Al-Mulk", surah:67, sort:8},
  {label:"Les 3 Qul (112-114)", surah:112, sort:9}
];
var PLATFORMS = ["YouTube","TikTok","Snap","Instagram","Facebook","X","WhatsApp","Telegram"];
var KIND_LABEL = {appel:"📣 L'appel (à reposter)", mensongere:"⚠️ Mensongère (à répondre)", autre:"Autre"};
var AV_COLORS = ["#E0795F","#5B8DEF","#4F9D69","#C46BB0","#E0A23C","#3FB0C9","#9B6BD6"];

/* ---------- Helpers ---------- */
var LS = window.localStorage;
function lget(k,d){ try{var v=LS.getItem(k);return v===null?d:v;}catch(e){return d;} }
function lset(k,v){ try{LS.setItem(k,v);}catch(e){} }
function ldel(k){ try{LS.removeItem(k);}catch(e){} }
function pad(n){return (n<10?"0":"")+n;}
function ymd(d){d=new Date(d);return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function today(){return ymd(new Date());}
function daysAgoStr(n){var d=new Date();d.setDate(d.getDate()-n);return ymd(d);}
function last7(){var a=[];for(var i=6;i>=0;i--)a.push(daysAgoStr(i));return a;}
function weekStart(){var d=new Date();var w=(d.getDay()+6)%7;d.setDate(d.getDate()-w);d.setHours(0,0,0,0);return ymd(d);}
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function avColor(name){var i=Math.max(0,DEFAULT_MEMBERS.indexOf(name));return AV_COLORS[i%AV_COLORS.length];}
function initials(name){return (name||"?").trim().charAt(0).toUpperCase();}
function heat(frac){ if(frac<=0)return "var(--strip0)"; var h=8+frac*112; return "hsl("+h+" 58% 47%)"; }
function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms);};}
function quranLink(s,a){ if(!s)return null; return "https://quran.com/"+s+(a?("/"+a):""); }
var DOW=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"], MON=["jan","fév","mar","avr","mai","juin","juil","aoû","sep","oct","nov","déc"];
function dateAdd(n){var d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+n);return d;}
function week7(){var a=[];for(var i=0;i<7;i++)a.push(ymd(dateAdd(i)));return a;}
function dParts(s){var p=String(s).split("-");return new Date(+p[0],(+p[1])-1,+p[2]);}
function dowShort(s){return DOW[dParts(s).getDay()];}
function dayNum(s){return dParts(s).getDate();}
function dayLabel(s){if(s===today())return "Aujourd'hui";if(s===ymd(dateAdd(1)))return "Demain";var d=dParts(s);return DOW[d.getDay()]+" "+d.getDate()+" "+MON[d.getMonth()];}
function copyText(t){ try{ if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).catch(fallbackCopy.bind(null,t));} else fallbackCopy(t);}catch(e){fallbackCopy(t);} }
function fallbackCopy(t){ try{var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}catch(e){} }

/* ---------- State ---------- */
var state = {
  code: lget("team:code",""), me: lget("team:me",""),
  view: "point", videoId:null, sheet:false,
  videoFilter:"all", argQuery:"", ideaFilter:"all", taskTab:"board", agendaScope:"team", agendaDay:"",
  members:[], duties:[], logs:[], tasks:[], videos:[], reposts:[], args:[], recits:[], ideas:[],
  ready:false, error:"", onbStep:"code", onbCode:"", onbNames:null
};
var sb=null, channel=null;

/* ---------- Supabase ---------- */
function client(){
  if(sb) return sb;
  var key = lget("team:sb_key","") || SB_KEY;
  if(!window.supabase || !window.supabase.createClient) throw new Error("supabase-js indisponible");
  sb = window.supabase.createClient(SB_URL, key, {realtime:{params:{eventsPerSecond:5}}});
  return sb;
}
function membersFor(code){ return client().from("team_members").select("*").eq("code",code); }

async function ensureGroup(code){
  var c=client();
  var m=await c.from("team_members").select("name").eq("code",code);
  if(!m.error && (!m.data||m.data.length===0))
    await c.from("team_members").upsert(DEFAULT_MEMBERS.map(function(n){return {code:code,name:n};}),{onConflict:"code,name",ignoreDuplicates:true});
  var d=await c.from("team_duties").select("id").eq("code",code);
  if(!d.error && (!d.data||d.data.length===0))
    await c.from("team_duties").upsert(DEFAULT_DUTIES.map(function(x){return {code:code,label:x.label,cadence:x.cadence,target:x.target,sort:x.sort};}),{onConflict:"code,label",ignoreDuplicates:true});
  var r=await c.from("team_recitations").select("id").eq("code",code);
  if(!r.error && (!r.data||r.data.length===0))
    await c.from("team_recitations").upsert(DEFAULT_RECITS.map(function(x){return {code:code,label:x.label,surah:x.surah,ayah:x.ayah||null,sort:x.sort};}),{onConflict:"code,label",ignoreDuplicates:true});
}

async function refreshAll(){
  var c=client(), code=state.code;
  var res=await Promise.all([
    c.from("team_members").select("*").eq("code",code).order("created_at",{ascending:true}),
    c.from("team_duties").select("*").eq("code",code).order("sort",{ascending:true}),
    c.from("team_duty_log").select("*").eq("code",code).gte("day",daysAgoStr(14)),
    c.from("team_tasks").select("*").eq("code",code).order("created_at",{ascending:false}),
    c.from("team_videos").select("*").eq("code",code).order("created_at",{ascending:false}),
    c.from("team_video_reposts").select("*").eq("code",code),
    c.from("team_arguments").select("*").eq("code",code).order("created_at",{ascending:false}),
    c.from("team_recitations").select("*").eq("code",code).order("sort",{ascending:true}),
    c.from("team_ideas").select("*").eq("code",code).order("created_at",{ascending:false})
  ]);
  state.members=res[0].data||[]; state.duties=res[1].data||[]; state.logs=res[2].data||[]; state.tasks=res[3].data||[];
  state.videos=res[4].data||[]; state.reposts=res[5].data||[]; state.args=res[6].data||[]; state.recits=res[7].data||[]; state.ideas=res[8].data||[];
  state.ready=true; render();
}
var debRefresh = debounce(function(){ refreshAll().catch(function(e){console.warn(e);}); }, 260);

function subscribe(){
  var c=client();
  if(channel){ try{c.removeChannel(channel);}catch(e){} }
  var f="code=eq."+state.code;
  var tables=["team_members","team_duties","team_duty_log","team_tasks","team_videos","team_video_reposts","team_arguments","team_recitations","team_ideas"];
  channel=c.channel("team-"+state.code);
  tables.forEach(function(t){ channel.on("postgres_changes",{event:"*",schema:"public",table:t,filter:f},debRefresh); });
  channel.subscribe();
}

/* ---------- Mutations ---------- */
function logFor(member,dutyId,day){ for(var i=0;i<state.logs.length;i++){var l=state.logs[i]; if(l.member===member&&l.duty_id===dutyId&&l.day===day)return l;} return null; }
async function bumpDuty(dutyId,delta){
  var day=today(),cur=logFor(state.me,dutyId,day),n=Math.max(0,(cur?cur.count:0)+delta);
  if(cur)cur.count=n; else state.logs.push({code:state.code,member:state.me,duty_id:dutyId,day:day,count:n}); render();
  await client().from("team_duty_log").upsert({code:state.code,member:state.me,duty_id:dutyId,day:day,count:n,updated_at:new Date().toISOString()},{onConflict:"code,member,duty_id,day"});
}

/* ---------- Computations ---------- */
function dailyDuties(){return state.duties.filter(function(d){return d.cadence==="per_day";});}
function weeklyDuties(){return state.duties.filter(function(d){return d.cadence==="per_week";});}
function countOn(member,dutyId,day){var l=logFor(member,dutyId,day);return l?l.count:0;}
function weekSum(member,dutyId){var ws=weekStart(),s=0;for(var i=0;i<state.logs.length;i++){var l=state.logs[i];if(l.member===member&&l.duty_id===dutyId&&l.day>=ws)s+=l.count;}return s;}
function dayFrac(member,day){var dd=dailyDuties();if(!dd.length)return 0;var n=0;for(var i=0;i<dd.length;i++)if(countOn(member,dd[i].id,day)>=(dd[i].target||1))n++;return n/dd.length;}
function membersSorted(){var a=state.members.slice();a.sort(function(x,y){if(x.name===state.me)return -1;if(y.name===state.me)return 1;return 0;});return a;}
function repostsFor(vid){return state.reposts.filter(function(r){return r.video_id===vid;});}
function argsFor(vid){return state.args.filter(function(a){return a.video_id===vid;});}
function recitsLeft(){return state.recits.filter(function(r){return !r.done;}).length;}
function ideasNew(){return state.ideas.filter(function(i){return i.status==="nouvelle";}).length;}
function shortLabel(s){return String(s).replace(/\s*\(.*?\)\s*/g,"").replace("Poster 1–2 vidéos","Vidéos").replace("Partager l'appel","Appel").replace("Point hebdo équipe","Point hebdo").replace("Réciter","Récit.");}

/* ---------- Render ---------- */
var app=document.getElementById("app");
function render(){
  if(state.error){ app.innerHTML='<div class="onb"><div class="card center"><b>Souci de connexion</b><p class="muted small">'+esc(state.error)+'</p><button class="btn" data-action="retry">Réessayer</button></div></div>'; return; }
  if(!state.code||!state.me){ renderOnboard(); return; }
  var v=state.view, body="";
  if(v==="point")body=viewPoint();
  else if(v==="videos")body=viewVideos();
  else if(v==="videoDetail")body=viewVideoDetail();
  else if(v==="args")body=viewArguments();
  else if(v==="recits")body=viewRecits();
  else if(v==="tasks")body=viewTasks();
  else if(v==="ideas")body=viewIdeas();
  else if(v==="duties")body=viewDuties();
  else if(v==="settings")body=viewSettings();
  app.innerHTML=header()+'<main class="fade">'+body+'</main>'+nav()+(state.sheet?sheet():"");
}
function header(){
  var dark=document.documentElement.getAttribute("data-theme")==="dark";

    '<button class="iconbtn" data-action="theme" aria-label="Thème">'+(dark?IC.sun:IC.moon)+'</button>'+
    '<button class="iconbtn" data-action="go" data-view="settings" aria-label="Réglages">'+IC.gear+'</button></header>';
}
function nav(){

function loading(){return '<div class="empty fade">Synchronisation…</div>';}

/* ----- Le point (hub) ----- */
function viewPoint(){
  if(!state.ready)return loading();
  var dd=dailyDuties(), tdy=today();
  var vids=state.videos.length, rec=recitsLeft(), ide=ideasNew(), openTasks=state.tasks.filter(function(t){return !t.done;}).length;
  var h='<div class="momento">'+
    momo(state.videos.filter(function(v){return v.kind==="appel";}).length,"📣 Appels à reposter")+
    momo(rec,"📖 Récit. restantes")+
    momo(openTasks,"📌 Tâches ouvertes")+'</div>';
  h+='<div class="links" style="margin-top:6px">'+
    link("videos",IC.videos,"Vidéos ("+vids+")")+
    link("args",IC.args,"Argumentaires ("+state.args.length+")")+
    link("recits",IC.recits,"Récitations")+
    link("ideas",IC.idea,"Idées"+(ide?" ("+ide+")":""))+'</div>';

  // à faire aujourd'hui (tâches datées)
  var tdyT=state.tasks.filter(function(t){return t.due_date===tdy&&!t.done;}).sort(function(a,b){var x=a.due_time||"99:99",y=b.due_time||"99:99";return x<y?-1:x>y?1:0;});
  var overN=state.tasks.filter(function(t){return t.due_date&&t.due_date<tdy&&!t.done;}).length;
  h+='<h2 class="sec">À faire aujourd\'hui'+(overN?' · <span style="color:var(--accent-d)">'+overN+' en retard</span>':'')+'</h2><div class="card">';
  if(!tdyT.length&&!overN) h+='<div class="muted small">Rien de daté aujourd\'hui.</div>';
  tdyT.slice(0,5).forEach(function(t){ h+='<div class="row" style="padding:5px 0"><span class="atime" style="min-width:42px">'+(t.due_time||"·")+'</span><div class="grow"><b>'+esc(t.title)+'</b>'+(t.assignee?' <span class="tiny" style="color:'+avColor(t.assignee)+'">'+esc(t.assignee)+'</span>':'')+'</div><button class="check" data-action="done" data-id="'+t.id+'" style="width:26px;height:26px"></button></div>'; });
  h+='<button class="btn ghost sm block" data-action="open-agenda" style="margin-top:8px">Ouvrir l\'agenda →</button></div>';

  // mes devoirs du jour (rapide)
  h+='<h2 class="sec">Mes devoirs du jour</h2><div class="card">';
  if(!dd.length) h+='<div class="muted small">Aucun devoir quotidien.</div>';
  dd.forEach(function(d){var c=countOn(state.me,d.id,tdy),ok=c>=(d.target||1);
    h+='<div class="row" style="padding:5px 0"><div class="grow"><b>'+esc(d.label)+'</b></div>'+
      '<span class="dpill'+(ok?" on":"")+'">'+(ok?"✓ "+c:"·")+'</span>'+
      '<button class="cbtn" data-action="bump" data-duty="'+d.id+'" data-delta="1" style="width:34px;height:34px;background:var(--accent);color:#fff">+</button></div>';});
  h+='<button class="btn ghost sm block" data-action="go" data-view="duties" style="margin-top:8px">Tous mes devoirs →</button></div>';

  // l'équipe
  h+='<h2 class="sec">L\'équipe</h2>';
  var days=last7();
  membersSorted().forEach(function(m){
    var pills=dd.map(function(d){var ok=countOn(m.name,d.id,tdy)>=(d.target||1);return '<span class="dpill'+(ok?" on":"")+'">'+(ok?"✓":"·")+" "+esc(shortLabel(d.label))+'</span>';}).join("");
    var wk=weeklyDuties().map(function(d){var s=weekSum(m.name,d.id),ok=s>=(d.target||1);return '<span class="dpill'+(ok?" on":"")+'">'+esc(shortLabel(d.label))+" "+s+"/"+(d.target||1)+'</span>';}).join("");
    var strip=days.map(function(day){return '<div class="sq" title="'+day+'" style="background:'+heat(dayFrac(m.name,day))+'"></div>';}).join("");
    h+='<div class="card"><div class="row"><div class="avatar" style="background:'+avColor(m.name)+'">'+esc(initials(m.name))+'</div><div class="grow"><div class="ttl">'+esc(m.name)+(m.name===state.me?' <span class="tiny accent">(toi)</span>':'')+'</div></div></div><div class="dlist">'+pills+wk+'</div><div class="strip">'+strip+'</div></div>';
  });
  return h;
}
function momo(v,l){return '<div class="card"><div class="big">'+v+'</div><div class="lbl">'+l+'</div></div>';}
function link(view,ic,label){return '<button class="linkcard" data-action="go" data-view="'+view+'">'+ic+'<span class="grow">'+label+'</span></button>';}

/* ----- Vidéos ----- */

    '<input id="v-title" class="field" placeholder="Titre (ex. L\'appel — épisode 12)">'+
    '<div class="row"><input id="v-topic" class="field" style="margin:0" placeholder="Sujet (ex. Tawhid)"><input id="v-platform" class="field" style="margin:0;width:42%" placeholder="Plateforme"></div>'+
    '<input id="v-url" class="field" placeholder="Lien (YouTube, etc.)">'+
    '<label class="lab">Type</label>'+
    '<select id="v-kind" class="field">'+
      '<option value="appel">📣 L\'appel (à reposter)</option>'+
      '<option value="mensongere">⚠️ Mensongère (à répondre)</option>'+
      '<option value="autre">Autre</option></select>'+
    '<button class="btn block" data-action="add-video">Ajouter</button></div>';

    var plats=PLATFORMS.slice(0,6).map(function(p){var on=mineP[p];var cnt=rp.filter(function(r){return r.platform===p;}).length;return '<button class="plat'+(on?" on":"")+'" data-action="repost" data-video="'+v.id+'" data-plat="'+esc(p)+'">'+esc(p)+(cnt?" ·"+cnt:"")+'</button>';}).join("");
    h+='<div class="card vid"><div class="row"><div class="grow"><div class="ttl">'+esc(v.title)+'</div>'+
      '<div class="tagrow" style="margin-top:5px">'+(v.topic?'<span class="pill">'+esc(v.topic)+'</span>':"")+'<span class="pill '+(v.kind==="mensongere"?"warn":"info")+'">'+(v.kind==="appel"?"📣 Appel":v.kind==="mensongere"?"⚠️ Réponse":"Autre")+'</span>'+(v.platform?'<span class="pill">'+esc(v.platform)+'</span>':"")+'</div></div></div>'+
      (v.url?'<a class="btn ghost sm" href="'+esc(v.url)+'" target="_blank" rel="noopener" style="align-self:flex-start">Ouvrir la vidéo ↗</a>':"")+
      (v.kind==="appel"?'<div><div class="tiny muted" style="margin-top:6px">Tu l\'as reposté sur :</div><div class="platrow">'+plats+'</div></div>':"")+
      '<button class="btn line sm" data-action="open-video" data-id="'+v.id+'" style="align-self:flex-start;margin-top:4px">Détails / argumentaires'+(na?" ("+na+")":"")+'</button>'+
    '</div>';
  });
  return h;
}
function tab2(id,label){return '<button class="tab2'+(state.videoFilter===id?" on":"")+'" data-action="vfilter" data-f="'+id+'">'+label+'</button>';}

    Object.keys(byP).forEach(function(p){ h+='<div class="row" style="padding:4px 0"><div class="grow"><b>'+esc(p)+'</b></div><span class="tiny muted">'+esc(byP[p].join(", "))+'</span></div>'; });

  }

function viewArguments(){
  if(!state.ready)return loading();
  var h='<div class="card"><div class="ttl" style="margin-bottom:4px">Nouvel argumentaire</div>'+
    '<input id="a-topic" class="field" placeholder="Sujet (ex. Divinité, Science, Histoire…)">'+
    '<input id="a-title" class="field" placeholder="Titre court">'+
    '<textarea id="a-body" class="field" placeholder="Le texte / la réponse…"></textarea>'+
    '<input id="a-ref" class="field" placeholder="Lien source (optionnel)">'+
    '<button class="btn block" data-action="add-arg">Ajouter à la bibliothèque</button></div>';
  h+='<input id="a-search" class="field" placeholder="Filtrer par sujet ou mot-clé" value="'+esc(state.argQuery)+'">';
  var q=state.argQuery.toLowerCase().trim();
  var lib=state.args.filter(function(a){ if(q){var hay=((a.topic||"")+" "+a.title+" "+(a.body||"")).toLowerCase(); if(hay.indexOf(q)<0)return false;} return true; });
  if(!lib.length){ h+='<div class="empty">'+(q?"Rien ne correspond.":"Bibliothèque vide — ajoute ton premier argumentaire.")+'</div>'; return h; }
  var groups={}; lib.forEach(function(a){var t=a.topic||"Sans sujet";(groups[t]=groups[t]||[]).push(a);});
  Object.keys(groups).sort().forEach(function(t){
    h+='<h2 class="sec">'+esc(t)+' ('+groups[t].length+')</h2>';
    groups[t].forEach(function(a){ h+=argCard(a); });
  });
  return h;
}

function viewRecits(){
  if(!state.ready)return loading();

  var h='<div class="card"><div class="row"><div class="grow"><div class="ttl">Récitations</div><div class="tiny muted">Coche ce qui est fait, ouvre le verset sur quran.com.</div></div><span class="pill '+(left.length?"warn":"on")+'">'+done.length+'/'+state.recits.length+'</span></div>'+
    '<div class="pbar" style="margin-top:10px"><i style="width:'+(state.recits.length?Math.round(done.length/state.recits.length*100):0)+'%"></i></div></div>';
  h+='<h2 class="sec">À réciter ('+left.length+')</h2><div class="card">';
  if(!left.length) h+='<div class="muted small center">Tout est fait, maa shaa Allah ✓</div>';
  left.forEach(function(r){ h+=recitRow(r); });
  h+='</div>';
  if(done.length){ h+='<h2 class="sec">Faites ('+done.length+')</h2><div class="card">'; done.forEach(function(r){ h+=recitRow(r); }); h+='</div>'; }
  h+='<h2 class="sec">Ajouter une récitation</h2><div class="card">'+
    '<input id="r-label" class="field" placeholder="Libellé (ex. Sourate An-Nâs)">'+

function recitRow(r){
  var lnk=quranLink(r.surah,r.ayah);
  return '<div class="recit"><button class="check'+(r.done?" on":"")+'" data-action="recit-toggle" data-id="'+r.id+'" data-done="'+(r.done?0:1)+'">'+(r.done?"✓":"")+'</button>'+
    '<div class="grow"><div class="ttl small">'+esc(r.label)+'</div>'+(r.done&&r.done_by?'<div class="tiny muted">par '+esc(r.done_by)+'</div>':"")+'</div>'+
    (lnk?'<a class="copybtn" href="'+esc(lnk)+'" target="_blank" rel="noopener">quran.com ↗</a>':"")+
    '<button class="copybtn" data-action="del-recit" data-id="'+r.id+'">✕</button></div>';
}

function viewTasks(){
  if(!state.ready)return loading();
  var opts='<option value="">— à prendre —</option>'+state.members.map(function(m){return '<option value="'+esc(m.name)+'"'+(m.name===state.me?" selected":"")+'>'+esc(m.name)+'</option>';}).join("");
  var h='<div class="card"><input id="t-title" class="field" placeholder="Nouvelle tâche (ex. monter la vidéo du vendredi)"><input id="t-note" class="field" placeholder="Note (optionnel)"><div class="row"><input id="t-date" class="field" style="margin:0" type="date"><input id="t-time" class="field" style="margin:0;width:44%" type="time"></div><label class="lab">Pour qui ?</label><select id="t-assignee" class="field">'+opts+'</select><button class="btn block" data-action="add-task">Ajouter la tâche</button></div>';
  h+='<div class="seg" style="margin-bottom:8px"><button data-action="tasktab" data-t="board" class="'+(state.taskTab==="board"?"on":"")+'">📌 Tableau</button><button data-action="tasktab" data-t="agenda" class="'+(state.taskTab==="agenda"?"on":"")+'">📅 Agenda</button></div>';
  if(state.taskTab==="agenda") return h+viewAgenda();
  var todo=state.tasks.filter(function(t){return !t.done&&!t.assignee;}), doing=state.tasks.filter(function(t){return !t.done&&t.assignee;}), done=state.tasks.filter(function(t){return t.done;});
  h+=tsec("À prendre ("+todo.length+")",todo,"todo")+tsec("En cours ("+doing.length+")",doing,"doing")+tsec("Fait ("+done.length+")",done,"done");

function viewAgenda(){
  var tdy=today(), scope=state.agendaScope, day=state.agendaDay||tdy;
  function inScope(t){return scope==="team"||t.assignee===state.me;}
  var dated=state.tasks.filter(function(t){return t.due_date&&inScope(t);});
  var over=dated.filter(function(t){return !t.done&&t.due_date<tdy;}).sort(function(a,b){return a.due_date<b.due_date?-1:1;});
  var dayTasks=dated.filter(function(t){return t.due_date===day;}).sort(function(a,b){var x=a.due_time||"99:99",y=b.due_time||"99:99";return x<y?-1:x>y?1:0;});
  var h='<div class="seg" style="margin-bottom:8px"><button data-action="agenda-scope" data-s="team" class="'+(scope==="team"?"on":"")+'">Équipe</button><button data-action="agenda-scope" data-s="me" class="'+(scope==="me"?"on":"")+'">Moi</button></div>';
  if(over.length){ h+='<h2 class="sec">⏰ En retard ('+over.length+')</h2>'; over.forEach(function(t){h+=agendaRow(t,true);}); }
  h+='<div class="weekstrip">'+week7().map(function(d){var sel=d===day,isT=d===tdy,n=dated.filter(function(t){return t.due_date===d&&!t.done;}).length;return '<button class="wday'+(sel?" sel":"")+(isT?" today":"")+'" data-action="agenda-day" data-d="'+d+'"><span class="wd">'+dowShort(d)+'</span><span class="wn">'+dayNum(d)+'</span>'+(n?'<span class="wdot">'+n+'</span>':'<span class="wdot empty"></span>')+'</button>';}).join("")+'</div>';
  h+='<h2 class="sec">'+dayLabel(day)+'</h2>';
  if(!dayTasks.length) h+='<div class="empty">Rien de prévu ce jour. Ajoute une tâche avec une date ci-dessus.</div>';
  dayTasks.forEach(function(t){h+=agendaRow(t,false);});
  return h;
}
function agendaRow(t,over){
  var col=t.assignee?avColor(t.assignee):"var(--muted)";
  return '<div class="arow"><span class="atime">'+(t.due_time||"·")+'</span>'+
    '<span class="adot" style="background:'+col+'"></span>'+
    '<div class="grow"><div class="ttl small'+(t.done?" done":"")+'">'+esc(t.title)+'</div>'+
      (t.assignee?'<span class="tiny" style="color:'+col+';font-weight:700">'+esc(t.assignee)+'</span>':'<span class="tiny muted">à prendre</span>')+
      (over?' <span class="tiny" style="color:var(--accent-d)">· '+dayLabel(t.due_date)+'</span>':'')+'</div>'+
    (over?'<button class="copybtn" data-action="reschedule" data-id="'+t.id+'" data-to="'+today()+'">→ auj.</button>':'')+
    '<button class="check'+(t.done?" on":"")+'" data-action="'+(t.done?"reopen":"done")+'" data-id="'+t.id+'" style="width:28px;height:28px">'+(t.done?"✓":"")+'</button></div>';
}
function tsec(title,list,kind){
  var h='<h2 class="sec">'+title+'</h2>';
  if(!list.length)return h+'<p class="tiny muted" style="margin:0 4px 4px">—</p>';
  h+='<div class="grid">';
  list.forEach(function(t,i){
    var col="var(--p"+((i%6)+1)+")", who=t.assignee?'<span class="who">'+esc(t.assignee)+(t.assignee===state.me?" · toi":"")+'</span>':"", acts="";
    if(kind==="todo")acts='<button class="pact pri" data-action="take" data-id="'+t.id+'">Je prends</button><button class="pact" data-action="done" data-id="'+t.id+'">Fait ✓</button>';
    else if(kind==="doing")acts='<button class="pact pri" data-action="done" data-id="'+t.id+'">Fait ✓</button>'+(t.assignee===state.me?'<button class="pact" data-action="drop" data-id="'+t.id+'">Lâcher</button>':'<button class="pact" data-action="take" data-id="'+t.id+'">Reprendre</button>');
    else {who=t.done_by?'<span class="who">par '+esc(t.done_by)+'</span>':who;acts='<button class="pact" data-action="reopen" data-id="'+t.id+'">Rouvrir</button><button class="pact" data-action="del" data-id="'+t.id+'">Suppr</button>';}
    h+='<div class="postit'+(t.done?" done":"")+'" style="background:'+col+'"><div class="pt">'+esc(t.title)+'</div>'+(t.due_date?'<div class="tiny" style="font-weight:700;opacity:.85">📅 '+dayLabel(t.due_date)+(t.due_time?" "+t.due_time:"")+'</div>':"")+(t.note?'<div class="pn">'+esc(t.note)+'</div>':"")+who+'<div class="pacts">'+acts+'</div></div>';
  });
  return h+'</div>';
}

function val(id){var e=document.getElementById(id);return e?e.value:"";}
document.addEventListener("click",function(ev){
  var el=ev.target.closest("[data-action],[data-nav]"); if(!el)return;
  var navv=el.getAttribute("data-nav");
  if(navv){ state.view=navv; state.videoId=null; render(); return; }
  var a=el.getAttribute("data-action");
  try{ handle(a,el); }catch(e){ console.error(e); }
});
async function handle(a,el){
  if(a==="theme"){ toggleTheme(); render(); return; }
  if(a==="retry"){ state.error=""; render(); start(); return; }
  if(a==="go"){ state.view=el.getAttribute("data-view"); state.videoId=null; state.sheet=false; render(); return; }
  if(a==="sheet-close"){ state.sheet=false; render(); return; }

  if(a==="code-next"){ var c=val("ob-code").trim(); if(!c)return; state.onbCode=c; await loadNames(c); state.onbStep="name"; renderOnboard(); return; }
  if(a==="back-code"){ state.onbStep="code"; renderOnboard(); return; }
  if(a==="pick-name"){ joinAs(el.getAttribute("data-name")); return; }
  if(a==="pick-custom"){ var n=val("ob-name").trim(); if(n)joinAs(n); return; }

  if(a==="bump"){ bumpDuty(parseInt(el.getAttribute("data-duty"),10),parseInt(el.getAttribute("data-delta"),10)); return; }

  if(a==="add-task"){ addTask(val("t-title"),val("t-note"),val("t-assignee"),val("t-date"),val("t-time")); return; }
  if(a==="tasktab"){ state.taskTab=el.getAttribute("data-t"); render(); return; }
  if(a==="agenda-scope"){ state.agendaScope=el.getAttribute("data-s"); render(); return; }
  if(a==="agenda-day"){ state.agendaDay=el.getAttribute("data-d"); render(); return; }
  if(a==="reschedule"){ taskUpdate(parseInt(el.getAttribute("data-id"),10),{due_date:el.getAttribute("data-to")}); return; }
  if(a==="open-agenda"){ state.view="tasks"; state.taskTab="agenda"; render(); return; }
  if(a==="take"){ taskUpdate(parseInt(el.getAttribute("data-id"),10),{assignee:state.me}); return; }
  if(a==="drop"){ taskUpdate(parseInt(el.getAttribute("data-id"),10),{assignee:null}); return; }
  if(a==="done"){ taskUpdate(parseInt(el.getAttribute("data-id"),10),{done:true,done_by:state.me}); return; }
  if(a==="reopen"){ taskUpdate(parseInt(el.getAttribute("data-id"),10),{done:false,done_by:null}); return; }
  if(a==="del"){ taskDelete(parseInt(el.getAttribute("data-id"),10)); return; }

  if(a==="vfilter"){ state.videoFilter=el.getAttribute("data-f"); render(); return; }
  if(a==="add-video"){ addVideo(val("v-title"),val("v-topic"),val("v-kind"),val("v-url"),val("v-platform")); return; }
  if(a==="open-video"){ state.videoId=parseInt(el.getAttribute("data-id"),10); state.view="videoDetail"; render(); return; }
  if(a==="del-video"){ delVideo(parseInt(el.getAttribute("data-id"),10)); return; }
  if(a==="repost"){ toggleRepost(parseInt(el.getAttribute("data-video"),10),el.getAttribute("data-plat")); return; }

  if(a==="add-arg"){ addArgument(val("a-topic"),val("a-title"),val("a-body"),val("a-ref"),null); return; }
  if(a==="add-arg-video"){ addArgument(val("va-topic"),val("va-title"),val("va-body"),val("va-ref"),parseInt(el.getAttribute("data-video"),10)); return; }
  if(a==="del-arg"){ delArgument(parseInt(el.getAttribute("data-id"),10)); return; }
  if(a==="copy-arg"){ var ar=state.args.find(function(x){return x.id===parseInt(el.getAttribute("data-id"),10);}); if(ar){copyText(ar.body||"");el.textContent="Copié ✓";} return; }

  if(a==="add-recit"){ addRecit(val("r-label"),parseInt(val("r-surah"),10)||null,parseInt(val("r-ayah"),10)||null); return; }
  if(a==="recit-toggle"){ toggleRecit(parseInt(el.getAttribute("data-id"),10),el.getAttribute("data-done")==="1"); return; }
  if(a==="del-recit"){ delRecit(parseInt(el.getAttribute("data-id"),10)); return; }

  if(a==="iseg"){ var seg=document.getElementById("i-kind-seg"); if(seg){[].forEach.call(seg.children,function(b){b.classList.remove("on");}); el.classList.add("on");} return; }
  if(a==="ifilter"){ state.ideaFilter=el.getAttribute("data-f"); render(); return; }
  if(a==="add-idea"){ var seg2=document.getElementById("i-kind-seg"); var on=seg2&&seg2.querySelector(".on"); var k=on?on.getAttribute("data-k"):"idee"; addIdea(val("i-text"),k); return; }
  if(a==="idea-task"){ var id1=parseInt(el.getAttribute("data-id"),10); var idea=state.ideas.find(function(x){return x.id===id1;}); if(idea)ideaToTask(idea); return; }
  if(a==="idea-done"){ setIdea(parseInt(el.getAttribute("data-id"),10),"faite"); return; }
  if(a==="del-idea"){ delIdea(parseInt(el.getAttribute("data-id"),10)); return; }

  if(a==="add-member"){ addMember(val("m-name")); return; }
  if(a==="add-duty"){ addDuty(val("d-label"),val("d-cadence"),parseInt(val("d-target"),10)||1); return; }
  if(a==="switch-me"){ state.me=""; ldel("team:me"); state.onbStep="name"; state.onbCode=state.code; await loadNames(state.code); renderOnboard(); return; }
  if(a==="logout"){ ldel("team:me"); ldel("team:code"); state.me=""; state.code=""; state.ready=false; state.onbStep="code"; render(); return; }
}
document.addEventListener("input",function(ev){ if(ev.target&&ev.target.id==="a-search"){ state.argQuery=ev.target.value; var pos=ev.target.selectionStart; render(); var nb=document.getElementById("a-search"); if(nb){nb.focus(); try{nb.setSelectionRange(pos,pos);}catch(e){}} } });

async function loadNames(code){ try{var r=await membersFor(code); state.onbNames=(r.data||[]).map(function(m){return m.name;});}catch(e){state.onbNames=null;} }
async function joinAs(name){ state.code=state.onbCode||state.code; state.me=name; lset("team:code",state.code); lset("team:me",name); render(); start(); }

function toggleTheme(){ var d=document.documentElement.getAttribute("data-theme")==="dark"; setTheme(d?"light":"dark"); }
function setTheme(t){ document.documentElement.setAttribute("data-theme",t); lset("team:theme",t); var m=document.querySelector('meta[name=theme-color]'); if(m)m.setAttribute("content",t==="dark"?"#15120E":"#E0795F"); }

async function start(){ if(!state.code||!state.me)return; try{ client(); await ensureGroup(state.code); await refreshAll(); subscribe(); }catch(e){ console.error(e); state.error=(e&&e.message)||"connexion impossible"; render(); } }
function init(){
  setTheme(lget("team:theme",(window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light"));
  if(state.code&&state.me){ state.onbStep="name"; render(); start(); }
  else { state.onbStep="code"; state.onbCode=state.code||""; renderOnboard(); }
  document.addEventListener("visibilitychange",function(){ if(!document.hidden&&state.code&&state.me)debRefresh(); });
}
if(window.supabase||document.readyState!=="loading"){ ready(); } else { window.addEventListener("DOMContentLoaded",ready); }
function ready(){ try{ init(); }catch(e){ console.error(e); app.innerHTML='<div class="onb center muted">Erreur: '+esc(e.message)+'</div>'; } }
window.__APP__={state:state,render:render,handle:handle,ymd:ymd,weekStart:weekStart,quranLink:quranLink,today:today,week7:week7,dayLabel:dayLabel};
if("serviceWorker" in navigator){ window.addEventListener("load",function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); }); }
})();
</script>
